<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Lemaire Atelier | Measurement System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Syne+Mono&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  </head>
  <body class="bg-[#1E1A18] text-[#E8E2D9] selection:bg-[#C9A96E] selection:text-[#1E1A18]">
    <div id="root"></div>
    <script>
      window.onerror = function(msg, url, lineNo, columnNo, error) {
        var str = 'Error: ' + msg + '\nURL: ' + url + '\nLine: ' + lineNo + '\nColumn: ' + columnNo;
        if (error && error.stack) str += '\n\nStack:\n' + error.stack;
        document.body.innerHTML = '<div style="background:#800;color:#fff;padding:20px;white-space:pre-wrap;font-family:monospace;position:absolute;top:0;left:0;right:0;bottom:0;z-index:9999;">' + str + '</div>';
        return false;
      };
      window.addEventListener('unhandledrejection', function(event) {
        document.body.innerHTML = '<div style="background:#800;color:#fff;padding:20px;white-space:pre-wrap;font-family:monospace;position:absolute;top:0;left:0;right:0;bottom:0;z-index:9999;">Unhandled Promise Rejection:\n' + (event.reason && event.reason.stack ? event.reason.stack : event.reason) + '</div>';
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
